name: Deploy documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-documentation
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: npm run docs:build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Upload release
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          RELEASE="${GITHUB_SHA}"
          REMOTE_ROOT="/var/www/vitepress-docs"
          SSH_PORT="${SERVER_PORT:-22}"

          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p '$REMOTE_ROOT/releases/$RELEASE'"

          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            docs/.vitepress/dist/ \
            "$SERVER_USER@$SERVER_HOST:$REMOTE_ROOT/releases/$RELEASE/"

          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" \
            "ln -sfn '$REMOTE_ROOT/releases/$RELEASE' '$REMOTE_ROOT/current' && \
             find '$REMOTE_ROOT/releases' -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' | \
             sort -nr | tail -n +6 | cut -d' ' -f2- | xargs -r rm -rf"
