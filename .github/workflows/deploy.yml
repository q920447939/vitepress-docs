name: Deploy documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-documentation
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: npm run docs:build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Upload release
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          RELEASE="${GITHUB_SHA}"
          REMOTE_ROOT="/var/www/vitepress-docs"
          SSH_PORT="${SERVER_PORT:-22}"

          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p '$REMOTE_ROOT/releases/$RELEASE'"

          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            docs/.vitepress/dist/ \
            "$SERVER_USER@$SERVER_HOST:$REMOTE_ROOT/releases/$RELEASE/"

          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" \
            bash -s -- "$REMOTE_ROOT" "$RELEASE" <<'REMOTE_SCRIPT'
          set -euo pipefail

          REMOTE_ROOT="$1"
          RELEASE="$2"
          TEMP_LINK="$REMOTE_ROOT/.current-$RELEASE"

          ln -sfn "$REMOTE_ROOT/releases/$RELEASE" "$TEMP_LINK"
          mv -Tf "$TEMP_LINK" "$REMOTE_ROOT/current"

          mapfile -d '' -t OLD_RELEASES < <(
            find "$REMOTE_ROOT/releases" \
              -mindepth 1 -maxdepth 1 -type d -printf '%T@\t%p\0' |
              sort -z -nr |
              tail -z -n +6 |
              cut -z -f2-
          )

          for OLD_RELEASE in "${OLD_RELEASES[@]}"; do
            rm -rf -- "$OLD_RELEASE"
          done
          REMOTE_SCRIPT
